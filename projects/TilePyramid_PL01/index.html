<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>TilePyramid_PL01</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
    }

    /* Full-screen background layer — never captures gameplay input */
    #bg-layer {
      position: fixed;
      inset: 0;
      background-color: #1a1a2e;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 0;
    }

    /* Game container spans full viewport; input falls through to canvas only */
    #game-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* Only the Phaser canvas receives pointer events */
    #game-container canvas {
      pointer-events: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
